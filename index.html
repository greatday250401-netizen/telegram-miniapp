<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Data Query</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --tg-bg: var(--tg-theme-bg-color, #ffffff);
      --tg-text: var(--tg-theme-text-color, #222222);
      --tg-hint: var(--tg-theme-hint-color, #999999);
      --tg-btn: var(--tg-theme-button-color, #3390ec);
      --tg-btn-text: var(--tg-theme-button-text-color, #ffffff);
      --tg-secondary-bg: var(--tg-theme-secondary-bg-color, #f1f1f1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--tg-bg);
      color: var(--tg-text);
      min-height: 100vh;
      padding: 16px;
    }

    h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--tg-text);
    }

    .section-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--tg-hint);
      margin-bottom: 8px;
    }

    .section { margin-bottom: 20px; }

    /* Chip grid for query types */
    .chip-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .chip {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1.5px solid transparent;
      background: var(--tg-secondary-bg);
      color: var(--tg-text);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s ease;
      user-select: none;
    }

    .chip.selected {
      background: var(--tg-btn);
      color: var(--tg-btn-text);
      border-color: var(--tg-btn);
    }

    /* Period pills */
    .period-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill {
      padding: 7px 14px;
      border-radius: 20px;
      background: var(--tg-secondary-bg);
      color: var(--tg-text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      user-select: none;
      white-space: nowrap;
    }

    .pill.selected {
      background: var(--tg-btn);
      color: var(--tg-btn-text);
    }

    /* Optional filter row */
    .filter-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-chip {
      padding: 6px 12px;
      border-radius: 8px;
      background: var(--tg-secondary-bg);
      color: var(--tg-text);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s ease;
      user-select: none;
    }

    .filter-chip.selected {
      background: color-mix(in srgb, var(--tg-btn) 20%, transparent);
      color: var(--tg-btn);
      font-weight: 600;
    }

    /* Preview box */
    .preview {
      background: var(--tg-secondary-bg);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      color: var(--tg-hint);
      min-height: 44px;
      display: flex;
      align-items: center;
    }

    .preview span {
      color: var(--tg-text);
      font-style: italic;
    }

    /* Send button */
    .send-btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      background: var(--tg-btn);
      color: var(--tg-btn-text);
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s ease;
    }

    .send-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .send-btn:active:not(:disabled) {
      opacity: 0.85;
    }

    .divider {
      height: 1px;
      background: var(--tg-secondary-bg);
      margin: 4px 0 20px;
    }

    /* Response display */
    .response-box {
      background: var(--tg-secondary-bg);
      border-radius: 10px;
      padding: 14px;
      font-size: 14px;
      color: var(--tg-text);
      margin-top: 12px;
      min-height: 60px;
      border-left: 3px solid var(--tg-btn);
    }

    .response-box.loading {
      color: var(--tg-hint);
      font-style: italic;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .response-box.error {
      border-left-color: #ff4444;
      color: #ff4444;
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid var(--tg-hint);
      border-top-color: var(--tg-btn);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* History section */
    .history-item {
      background: var(--tg-secondary-bg);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .history-item .query {
      font-weight: 600;
      color: var(--tg-text);
      margin-bottom: 4px;
    }

    .history-item .response {
      color: var(--tg-hint);
      font-size: 11px;
    }
  </style>
</head>
<body>

  <h2>What do you want to know?</h2>

  <!-- REPORT TYPE -->
  <div class="section">
    <div class="section-label">Report</div>
    <div class="chip-grid" id="reportGrid"></div>
  </div>

  <!-- TIME PERIOD -->
  <div class="section">
    <div class="section-label">Period</div>
    <div class="period-grid" id="periodGrid"></div>
  </div>

  <!-- SPORT FILTER -->
  <div class="section" id="filterSection" style="display:none">
    <div class="section-label">Sport</div>
    <div class="filter-row" id="filterGrid"></div>
  </div>

  <!-- MARKET FILTER -->
  <div class="section" id="marketSection" style="display:none">
    <div class="section-label">Market</div>
    <div class="filter-row" id="marketGrid"></div>
  </div>

  <div class="divider"></div>

  <!-- QUERY PREVIEW -->
  <div class="section">
    <div class="section-label">Query preview</div>
    <div class="preview" id="preview">Select a report and period above</div>
  </div>

  <!-- SEND -->
  <button class="send-btn" id="sendBtn" disabled onclick="sendQuery()">Send</button>

  <!-- RESPONSE -->
  <div id="responseBox" style="display:none" class="response-box"></div>

  <!-- HISTORY -->
  <div id="historySection" style="display:none; margin-top: 20px;">
    <div class="section-label">Recent queries</div>
    <div id="history"></div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // Extract user_id from Telegram initData
    const initData = tg.initData;
    const params = new URLSearchParams(initData);
    const userStr = params.get('user');
    const userId = userStr ? JSON.parse(userStr).id : null;

    // ⚠️ UPDATE THIS with your backend URL ⚠️
    const BACKEND_URL = "http://localhost:5000";  // Change this when deployed
    // const BACKEND_URL = "https://your-backend.herokuapp.com";  // Example: deployed to Heroku

    let queryHistory = [];

    // ── Config ── edit these to match your business ──────────────────────
    const REPORTS = [
      { label: "S1",         value: "S1" },
      { label: "Laystars",   value: "Laystars" },
      { label: "Fairenter",  value: "Fairenter" },
    ];

    const PERIODS = [
      { label: "Today",         value: "today" },
      { label: "Yesterday",     value: "yesterday" },
      { label: "This Week",     value: "this week" },
      { label: "Last Week",     value: "last week" },
      { label: "This Month",    value: "this month" },
      { label: "Last Month",    value: "last month" },
      { label: "This Quarter",  value: "this quarter" },
      { label: "Last Quarter",  value: "last quarter" },
      { label: "YTD",           value: "year to date" },
    ];

    // Sport filter — applies to all reports
    const FILTERS = ["Overall", "Soccer", "Cricket"];

    // Market filter — applies to all reports
    const MARKETS = ["All", "Market Odds", "Other Markets"];
    // ────────────────────────────────────────────────────────────────────

    let selectedReport = null;
    let selectedPeriod = null;
    let selectedFilter = "Overall";
    let selectedMarket = null;

    // Render report chips
    const reportGrid = document.getElementById("reportGrid");
    REPORTS.forEach(r => {
      const el = document.createElement("div");
      el.className = "chip";
      el.textContent = r.label;
      el.dataset.value = r.value;
      el.onclick = () => selectReport(r, el);
      reportGrid.appendChild(el);
    });

    // Render period pills
    const periodGrid = document.getElementById("periodGrid");
    PERIODS.forEach(p => {
      const el = document.createElement("div");
      el.className = "pill";
      el.textContent = p.label;
      el.dataset.value = p.value;
      el.onclick = () => selectPeriod(p, el);
      periodGrid.appendChild(el);
    });

    function renderFilterRow(containerId, items, defaultValue, onSelect) {
      const grid = document.getElementById(containerId);
      grid.innerHTML = "";
      items.forEach(f => {
        const fc = document.createElement("div");
        fc.className = "filter-chip" + (f === defaultValue ? " selected" : "");
        fc.textContent = f;
        fc.onclick = () => {
          grid.querySelectorAll(".filter-chip").forEach(c => c.classList.remove("selected"));
          fc.classList.add("selected");
          onSelect(f);
          updatePreview();
        };
        grid.appendChild(fc);
      });
    }

    function selectReport(r, el) {
      document.querySelectorAll(".chip").forEach(c => c.classList.remove("selected"));
      el.classList.add("selected");
      selectedReport = r.value;
      selectedFilter = "Overall";
      selectedMarket = null;

      // Render sport filter
      renderFilterRow("filterGrid", FILTERS, "Overall", val => {
        selectedFilter = val === "Overall" ? "Overall" : val;
      });
      document.getElementById("filterSection").style.display = "block";

      // Render market filter
      renderFilterRow("marketGrid", MARKETS, "All", val => {
        selectedMarket = val === "All" ? null : val;
      });
      document.getElementById("marketSection").style.display = "block";

      updatePreview();
    }

    function selectPeriod(p, el) {
      document.querySelectorAll(".pill").forEach(c => c.classList.remove("selected"));
      el.classList.add("selected");
      selectedPeriod = p.value;
      updatePreview();
    }

    function buildQuery() {
      if (!selectedReport || !selectedPeriod) return null;
      let q = `show me ${selectedReport} for ${selectedPeriod}`;
      if (selectedFilter && selectedFilter !== "Overall") q += ` [${selectedFilter}]`;
      if (selectedMarket) q += ` [${selectedMarket}]`;
      return q;
    }

    function updatePreview() {
      const q = buildQuery();
      const preview = document.getElementById("preview");
      const sendBtn = document.getElementById("sendBtn");
      if (q) {
        preview.innerHTML = `<span>${q}</span>`;
        sendBtn.disabled = false;
      } else {
        preview.innerHTML = "Select a report and period above";
        sendBtn.disabled = true;
      }
    }

    async function sendQuery() {
      const q = buildQuery();
      if (!q || !userId) {
        showResponse("Error: Could not extract user ID from Telegram", "error");
        return;
      }

      // Show loading state
      showResponse(`<div class="spinner"></div> Sending query...`, "loading");
      const sendBtn = document.getElementById("sendBtn");
      sendBtn.disabled = true;

      try {
        const response = await fetch(`${BACKEND_URL}/query`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query: q, user_id: userId })
        });

        const data = await response.json();

        if (data.status === "success") {
          showResponse(`📬 Bot responded:\n\n${data.response}`, "success");
          addToHistory(q, data.response);
        } else if (data.status === "timeout") {
          showResponse("⏱️ No response from bot (timeout). Check your chat.", "error");
          addToHistory(q, "No response (timeout)");
        } else {
          showResponse(`❌ Error: ${data.error}`, "error");
          addToHistory(q, `Error: ${data.error}`);
        }
      } catch (err) {
        showResponse(`❌ Connection error:\n${err.message}\n\nMake sure backend is running at: ${BACKEND_URL}`, "error");
        addToHistory(q, `Error: ${err.message}`);
      } finally {
        sendBtn.disabled = false;
      }
    }

    function showResponse(text, type = "success") {
      const box = document.getElementById("responseBox");
      box.innerHTML = text;
      box.className = `response-box ${type}`;
      box.style.display = "block";
    }

    function addToHistory(query, response) {
      queryHistory.unshift({ q: query, r: response, time: new Date().toLocaleTimeString() });
      if (queryHistory.length > 5) queryHistory.pop(); // Keep last 5

      const historyDiv = document.getElementById("historySection");
      const historyList = document.getElementById("history");
      historyList.innerHTML = queryHistory.map(item => `
        <div class="history-item">
          <div class="query">🔍 ${item.q}</div>
          <div class="response">${item.time} — ${item.r.substring(0, 60)}${item.r.length > 60 ? "..." : ""}</div>
        </div>
      `).join("");
      historyDiv.style.display = "block";
    }
  </script>
</body>
</html>

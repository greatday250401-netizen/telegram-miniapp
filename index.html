<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Query Builder</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --tg-bg: var(--tg-theme-bg-color, #ffffff);
      --tg-text: var(--tg-theme-text-color, #222222);
      --tg-hint: var(--tg-theme-hint-color, #999999);
      --tg-btn: var(--tg-theme-button-color, #3390ec);
      --tg-btn-text: var(--tg-theme-button-text-color, #ffffff);
      --tg-secondary-bg: var(--tg-theme-secondary-bg-color, #f1f1f1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--tg-bg);
      color: var(--tg-text);
      min-height: 100vh;
      padding: 16px;
    }

    h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--tg-text);
    }

    .section-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--tg-hint);
      margin-bottom: 8px;
    }

    .section { margin-bottom: 20px; }

    .chip-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .chip {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1.5px solid transparent;
      background: var(--tg-secondary-bg);
      color: var(--tg-text);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s ease;
      user-select: none;
    }

    .chip.selected {
      background: var(--tg-btn);
      color: var(--tg-btn-text);
      border-color: var(--tg-btn);
    }

    .period-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill {
      padding: 7px 14px;
      border-radius: 20px;
      background: var(--tg-secondary-bg);
      color: var(--tg-text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      user-select: none;
      white-space: nowrap;
    }

    .pill.selected {
      background: var(--tg-btn);
      color: var(--tg-btn-text);
    }

    .filter-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-chip {
      padding: 6px 12px;
      border-radius: 8px;
      background: var(--tg-secondary-bg);
      color: var(--tg-text);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s ease;
      user-select: none;
    }

    .filter-chip.selected {
      background: color-mix(in srgb, var(--tg-btn) 20%, transparent);
      color: var(--tg-btn);
      font-weight: 600;
    }

    .divider {
      height: 1px;
      background: var(--tg-secondary-bg);
      margin: 20px 0;
    }

    .query-box {
      background: var(--tg-secondary-bg);
      border-radius: 10px;
      padding: 14px;
      font-size: 14px;
      color: var(--tg-text);
      min-height: 50px;
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      border-left: 3px solid var(--tg-btn);
    }

    .query-box.empty {
      color: var(--tg-hint);
      font-style: italic;
      border-left-color: var(--tg-hint);
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .btn {
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s ease;
      text-align: center;
    }

    .btn-primary {
      background: var(--tg-btn);
      color: var(--tg-btn-text);
    }

    .btn-secondary {
      background: var(--tg-secondary-bg);
      color: var(--tg-text);
      border: 1px solid var(--tg-hint);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .btn:active:not(:disabled) {
      opacity: 0.85;
    }

    .feedback {
      text-align: center;
      font-size: 12px;
      color: var(--tg-hint);
      margin-top: 8px;
      height: 16px;
    }

    .feedback.success {
      color: #31a24c;
    }
  </style>
</head>
<body>

  <h2>📊 Query Builder</h2>

  <!-- REPORT TYPE -->
  <div class="section">
    <div class="section-label">Report</div>
    <div class="chip-grid" id="reportGrid"></div>
  </div>

  <!-- TIME PERIOD -->
  <div class="section">
    <div class="section-label">Period</div>
    <div class="period-grid" id="periodGrid"></div>
  </div>

  <!-- SPORT FILTER -->
  <div class="section">
    <div class="section-label">Sport</div>
    <div class="filter-row" id="filterGrid"></div>
  </div>

  <!-- MARKET FILTER -->
  <div class="section">
    <div class="section-label">Market</div>
    <div class="filter-row" id="marketGrid"></div>
  </div>

  <div class="divider"></div>

  <!-- QUERY DISPLAY -->
  <div class="section">
    <div class="section-label">Your query</div>
    <div class="query-box empty" id="queryBox">Select a report and period</div>
  </div>

  <!-- BUTTONS -->
  <div class="button-row">
    <button class="btn btn-secondary" id="copyBtn" disabled onclick="copyQuery()">📋 Copy</button>
    <button class="btn btn-primary" id="sendBtn" disabled onclick="sendToBot()">✈️ Send to Bot</button>
  </div>

  <div class="feedback" id="feedback"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // ── Config ── edit these to match your business ──────────────────────
    const REPORTS = [
      { label: "S1",         value: "S1" },
      { label: "Laystars",   value: "Laystars" },
      { label: "Fairenter",  value: "Fairenter" },
    ];

    const PERIODS = [
      { label: "Today",         value: "today" },
      { label: "Yesterday",     value: "yesterday" },
      { label: "This Week",     value: "this week" },
      { label: "Last Week",     value: "last week" },
      { label: "This Month",    value: "this month" },
      { label: "Last Month",    value: "last month" },
      { label: "This Quarter",  value: "this quarter" },
      { label: "Last Quarter",  value: "last quarter" },
      { label: "YTD",           value: "year to date" },
    ];

    const FILTERS = ["Overall", "Soccer", "Cricket"];
    const MARKETS = ["All", "Market Odds", "Other Markets"];

    // Your existing bot username (without @)
    const BOT_USERNAME = "bob20260223bot";
    // ────────────────────────────────────────────────────────────────────

    let selectedReport = null;
    let selectedPeriod = null;
    let selectedFilter = "Overall";
    let selectedMarket = null;

    // Render report chips
    const reportGrid = document.getElementById("reportGrid");
    REPORTS.forEach(r => {
      const el = document.createElement("div");
      el.className = "chip";
      el.textContent = r.label;
      el.dataset.value = r.value;
      el.onclick = () => selectReport(r, el);
      reportGrid.appendChild(el);
    });

    // Render period pills
    const periodGrid = document.getElementById("periodGrid");
    PERIODS.forEach(p => {
      const el = document.createElement("div");
      el.className = "pill";
      el.textContent = p.label;
      el.dataset.value = p.value;
      el.onclick = () => selectPeriod(p, el);
      periodGrid.appendChild(el);
    });

    function renderFilterRow(containerId, items, defaultValue, onSelect) {
      const grid = document.getElementById(containerId);
      grid.innerHTML = "";
      items.forEach(f => {
        const fc = document.createElement("div");
        fc.className = "filter-chip" + (f === defaultValue ? " selected" : "");
        fc.textContent = f;
        fc.onclick = () => {
          grid.querySelectorAll(".filter-chip").forEach(c => c.classList.remove("selected"));
          fc.classList.add("selected");
          onSelect(f);
          updateQuery();
        };
        grid.appendChild(fc);
      });
    }

    function selectReport(r, el) {
      document.querySelectorAll(".chip").forEach(c => c.classList.remove("selected"));
      el.classList.add("selected");
      selectedReport = r.value;
      selectedFilter = "Overall";
      selectedMarket = null;

      renderFilterRow("filterGrid", FILTERS, "Overall", val => {
        selectedFilter = val === "Overall" ? "Overall" : val;
      });

      renderFilterRow("marketGrid", MARKETS, "All", val => {
        selectedMarket = val === "All" ? null : val;
      });

      updateQuery();
    }

    function selectPeriod(p, el) {
      document.querySelectorAll(".pill").forEach(c => c.classList.remove("selected"));
      el.classList.add("selected");
      selectedPeriod = p.value;
      updateQuery();
    }

    function buildQuery() {
      if (!selectedReport || !selectedPeriod) return null;
      let q = `show me ${selectedReport} for ${selectedPeriod}`;
      if (selectedFilter && selectedFilter !== "Overall") q += ` [${selectedFilter}]`;
      if (selectedMarket) q += ` [${selectedMarket}]`;
      return q;
    }

    function updateQuery() {
      const q = buildQuery();
      const queryBox = document.getElementById("queryBox");
      const copyBtn = document.getElementById("copyBtn");
      const sendBtn = document.getElementById("sendBtn");

      if (q) {
        queryBox.textContent = q;
        queryBox.classList.remove("empty");
        copyBtn.disabled = false;
        sendBtn.disabled = false;
      } else {
        queryBox.textContent = "Select a report and period";
        queryBox.classList.add("empty");
        copyBtn.disabled = true;
        sendBtn.disabled = true;
      }
      clearFeedback();
    }

    function copyQuery() {
      const q = buildQuery();
      if (!q) return;

      // Try modern clipboard API
      if (navigator.clipboard) {
        navigator.clipboard.writeText(q).then(() => {
          showFeedback("✅ Copied!", "success");
        }).catch(() => {
          fallbackCopy(q);
        });
      } else {
        fallbackCopy(q);
      }
    }

    function fallbackCopy(text) {
      const textarea = document.createElement("textarea");
      textarea.value = text;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand("copy");
      document.body.removeChild(textarea);
      showFeedback("✅ Copied!", "success");
    }

    function sendToBot() {
      const q = buildQuery();
      if (!q) return;

      // Create bot URL - try multiple formats
      const encodedQuery = encodeURIComponent(q);
      const botUrl = `https://t.me/${BOT_USERNAME}`;

      // Try to open the bot chat
      try {
        // Method 1: Use Telegram's openLink (works in Telegram WebApp)
        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.openLink) {
          window.Telegram.WebApp.openLink(botUrl, true);
          showFeedback("✈️ Opening @" + BOT_USERNAME + "...", "success");
          return;
        }
      } catch(e) {
        console.log("openLink failed:", e);
      }

      // Method 2: Use window.location (fallback)
      try {
        window.location.href = botUrl;
        showFeedback("✈️ Opening @" + BOT_USERNAME + "...", "success");
        return;
      } catch(e) {
        console.log("window.location failed:", e);
      }

      // Method 3: Fallback - show URL and copy button
      showFeedback("⚠️ Could not open bot automatically. Use Copy button to paste query.", "");
    }

    function showFeedback(text, type = "info") {
      const fb = document.getElementById("feedback");
      fb.textContent = text;
      fb.className = "feedback " + type;
    }

    function clearFeedback() {
      document.getElementById("feedback").textContent = "";
      document.getElementById("feedback").className = "feedback";
    }
  </script>
</body>
</html>
